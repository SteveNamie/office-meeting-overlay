<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Office Meeting Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:'Inter', Arial, sans-serif;
}

:root{
  --bar-width: 84%;
  --bar-max-width: 1180px;
  --bar-height: 74px;
  --bar-bottom: 4%;

  --bar-bg: rgba(92, 72, 45, 0.34);
  --bar-border: rgba(255,255,255,0.08);
  --text-main: #ffffff;
  --text-soft: rgba(255,255,255,0.90);
  --gold: #c8a14a;

  --left-width: 255px;
  --right-width: 165px;
}

.overlay{
  position:fixed;
  left:50%;
  bottom:var(--bar-bottom);
  transform:translateX(-50%);
  width:var(--bar-width);
  max-width:var(--bar-max-width);
  height:var(--bar-height);

  display:grid;
  grid-template-columns: var(--left-width) 2px 1fr var(--right-width);
  align-items:center;
  column-gap:18px;

  padding:0 22px;
  box-sizing:border-box;

  border-radius:16px;
  background:var(--bar-bg);
  border:1px solid var(--bar-border);

  -webkit-backdrop-filter: blur(12px) saturate(120%);
  backdrop-filter: blur(12px) saturate(120%);

  box-shadow: 0 8px 24px rgba(0,0,0,0.16);
}

/* LEFT */
.left{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.host-name{
  font-family:'Allura', cursive;
  font-size:20px;
  line-height:0.95;
  color:var(--text-main);
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.host-role{
  font-size:11px;
  line-height:1.1;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--text-soft);
  margin-bottom:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.host-company{
  font-size:11px;
  line-height:1.1;
  color:var(--text-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* DIVIDER */
.divider{
  width:2px;
  height:42px;
  background:var(--gold);
  border-radius:999px;
  justify-self:center;
}

/* CENTER */
.center{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.line1{
  font-size:20px;
  line-height:1.05;
  font-weight:600;
  color:var(--text-main);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-bottom:4px;
}

.line2{
  font-size:11px;
  line-height:1.1;
  color:var(--text-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* RIGHT */
.right{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  min-width:0;
}

.right img{
  display:block;
  max-width:100%;
  max-height:50px;
  object-fit:contain;
}

/* VERSION */
.version{
  position:fixed;
  right:10px;
  bottom:8px;
  font-size:10px;
  color:rgba(255,255,255,0.35);
  display:none;
}

/* TABLET */
@media (max-width: 1024px){
  :root{
    --bar-width: 90%;
    --left-width: 225px;
    --right-width: 140px;
  }

  .line1{ font-size:18px; }
  .host-name{ font-size:18px; }
  .right img{ max-height:42px; }
}

/* PHONE */
@media (max-width: 760px){
  :root{
    --bar-width: 94%;
    --bar-height: auto;
  }

  .overlay{
    grid-template-columns: 1fr;
    row-gap:8px;
    height:auto;
    padding:12px 16px;
  }

  .divider{
    display:none;
  }

  .right{
    justify-content:flex-start;
  }

  .host-name,
  .host-role,
  .host-company,
  .line1,
  .line2{
    white-space:normal;
  }
}
</style>
</head>
<body>

<script>
/* EDIT ONLY THIS SECTION */
const VERSION = "999";

const HOST_NAME = "Tabitha Tittle";
const HOST_ROLE = "Qualifying Broker";
const HOST_COMPANY = "Leading Edge Real Estate Group";

const MAIN_LINE = "Office Meeting • Guest Speaker";
const SECOND_LINE = "Add Speaker Name Here";

const LOGO_FILE = "OMLE.png";
const SHOW_VERSION = false;
</script>

<div class="overlay">
  <div class="left">
    <div class="host-name" id="hostName"></div>
    <div class="host-role" id="hostRole"></div>
    <div class="host-company" id="hostCompany"></div>
  </div>

  <div class="divider"></div>

  <div class="center">
    <div class="line1" id="mainLine"></div>
    <div class="line2" id="secondLine"></div>
  </div>

  <div class="right">
    <img id="logo" src="" alt="Logo">
  </div>
</div>

<div class="version" id="versionText"></div>

<script>
document.getElementById("hostName").textContent = HOST_NAME;
document.getElementById("hostRole").textContent = HOST_ROLE;
document.getElementById("hostCompany").textContent = HOST_COMPANY;
document.getElementById("mainLine").textContent = MAIN_LINE;
document.getElementById("secondLine").textContent = SECOND_LINE;
document.getElementById("logo").src = LOGO_FILE + "?v=" + VERSION;
