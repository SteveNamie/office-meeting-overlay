<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Office Meeting Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:'Inter', Arial, sans-serif;
}

/* =========================
   EASY EDIT CONTROLS
========================= */
:root{
  --bar-width: 88%;
  --bar-max-width: 1280px;
  --bar-height: 118px;
  --bar-bottom: 3.8%;

  --glass-bg: rgba(82, 67, 48, 0.44);
  --glass-bg-2: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255,255,255,0.12);
  --shadow: 0 10px 35px rgba(0,0,0,0.20);

  --text-main: #ffffff;
  --text-soft: rgba(255,255,255,0.88);
  --text-muted: rgba(255,255,255,0.72);

  --gold: #caa24c;
  --gold-soft: rgba(202,162,76,0.28);

  --host-name-size: 28px;
  --host-title-size: 11px;
  --host-subtitle-size: 14px;

  --meeting-title-size: 28px;
  --speaker-size: 16px;

  --logo-max-height: 72px;

  --divider-width: 2px;
  --divider-height: 62px;

  --corner-radius: 22px;
  --side-padding: 26px;
  --column-gap: 22px;
}

/* =========================
   WRAP
========================= */
.overlay-wrap{
  position:fixed;
  left:50%;
  bottom:var(--bar-bottom);
  transform:translateX(-50%);
  width:var(--bar-width);
  max-width:var(--bar-max-width);
  pointer-events:none;
  animation: overlayIn 900ms cubic-bezier(.2,.8,.2,1);
}

.overlay-bar{
  position:relative;
  min-height:var(--bar-height);
  box-sizing:border-box;
  padding:18px var(--side-padding);

  display:grid;
  grid-template-columns: 300px var(--divider-width) 1fr 220px;
  align-items:center;
  column-gap:var(--column-gap);

  border-radius:var(--corner-radius);
  overflow:hidden;

  background:
    linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.02)),
    linear-gradient(180deg, var(--glass-bg-2), rgba(255,255,255,0.01)),
    var(--glass-bg);

  border:1px solid var(--glass-border);

  -webkit-backdrop-filter: blur(16px) saturate(130%);
  backdrop-filter: blur(16px) saturate(130%);

  box-shadow: var(--shadow);
}

/* soft top sheen */
.overlay-bar::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    180deg,
    rgba(255,255,255,0.13) 0%,
    rgba(255,255,255,0.04) 18%,
    rgba(255,255,255,0.00) 42%
  );
  pointer-events:none;
}

/* subtle gold glow */
.overlay-bar::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:2px;
  background:linear-gradient(90deg,
    rgba(202,162,76,0.00) 0%,
    rgba(202,162,76,0.55) 18%,
    rgba(202,162,76,0.90) 50%,
    rgba(202,162,76,0.55) 82%,
    rgba(202,162,76,0.00) 100%);
  pointer-events:none;
}

/* =========================
   LEFT BLOCK
========================= */
.left-block{
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
  position:relative;
  z-index:2;
}

.host-name{
  font-family:'Allura', cursive;
  font-size:var(--host-name-size);
  line-height:0.95;
  color:var(--text-main);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-bottom:7px;
  text-shadow: 0 1px 2px rgba(0,0,0,0.18);
}

.host-title{
  font-size:var(--host-title-size);
  line-height:1.2;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.host-subtitle{
  font-size:var(--host-subtitle-size);
  line-height:1.25;
  font-weight:500;
  color:var(--text-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* =========================
   DIVIDER
========================= */
.gold-divider{
  width:var(--divider-width);
  height:var(--divider-height);
  justify-self:center;
  align-self:center;
  border-radius:999px;
  background:linear-gradient(
    180deg,
    rgba(202,162,76,0.12) 0%,
    rgba(202,162,76,1) 48%,
    rgba(202,162,76,0.12) 100%
  );
  box-shadow: 0 0 16px var(--gold-soft);
  position:relative;
  z-index:2;
}

/* =========================
   CENTER BLOCK
========================= */
.center-block{
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
  position:relative;
  z-index:2;
}

.meeting-kicker{
  font-size:11px;
  line-height:1;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--text-muted);
  margin-bottom:8px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.meeting-title{
  font-size:var(--meeting-title-size);
  line-height:1.05;
  font-weight:800;
  color:var(--text-main);
  margin-bottom:8px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  text-shadow: 0 1px 2px rgba(0,0,0,0.15);
}

.guest-row{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}

.guest-label{
  flex:0 0 auto;
  font-size:11px;
  line-height:1;
  font-weight:700;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--gold);
  padding:7px 9px 6px;
  border:1px solid rgba(202,162,76,0.28);
  border-radius:999px;
  background:rgba(202,162,76,0.10);
}

.guest-speaker{
  min-width:0;
  font-size:var(--speaker-size);
  line-height:1.2;
  font-weight:500;
  color:var(--text-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* =========================
   RIGHT BLOCK
========================= */
.right-block{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  min-width:0;
  position:relative;
  z-index:2;
}

.logo-shell{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
}

.logo-shell img{
  display:block;
  max-width:100%;
  max-height:var(--logo-max-height);
  object-fit:contain;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18));
}

/* =========================
   VERSION TAG
========================= */
.version-tag{
  position:absolute;
  right:14px;
  bottom:9px;
  font-size:10px;
  line-height:1;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.42);
  z-index:3;
  user-select:none;
}

/* =========================
   ANIMATION
========================= */
@keyframes overlayIn{
  from{
    opacity:0;
    transform:translateX(-50%) translateY(14px);
  }
  to{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
}

/* =========================
   RESPONSIVE
========================= */
@media (max-width: 1180px){
  :root{
    --bar-width: 91%;
    --bar-height: 110px;
    --host-name-size: 24px;
    --meeting-title-size: 24px;
    --speaker-size: 15px;
    --logo-max-height: 62px;
  }

  .overlay-bar{
    grid-template-columns: 260px var(--divider-width) 1fr 180px;
  }
}

@media (max-width: 860px){
  :root{
    --bar-width: 94%;
    --bar-height: auto;
    --side-padding: 18px;
    --column-gap: 14px;
  }

  .overlay-bar{
    grid-template-columns: 1fr;
    row-gap:12px;
    padding-top:16px;
    padding-bottom:18px;
  }

  .gold-divider{
    display:none;
  }

  .right-block{
    justify-content:flex-start;
  }

  .host-name,
  .host-title,
  .host-subtitle,
  .meeting-kicker,
  .meeting-title,
  .guest-speaker{
    white-space:normal;
  }

  .guest-row{
    flex-wrap:wrap;
  }
}
</style>
</head>
<body>

<script>
/* =========================
   MASTER EDIT PANEL
   CHANGE THESE ONLY
========================= */
const VERSION = "v101";

const HOST_NAME = "Tabitha Tittle";
const HOST_TITLE = "QUALIFYING BROKER";
const HOST_SUBTITLE = "Leading Edge Real Estate Group";

const MEETING_KICKER = "Leadership Meeting";
const MEETING_TITLE = "Office Meeting";
const GUEST_SPEAKER = "Add Guest Speaker Name Here";

const LOGO_FILE = "OMLE.png";

/* show or hide small version text in bottom-right corner */
const SHOW_VERSION = false;
</script>

<div class="overlay-wrap">
  <div class="overlay-bar">
    
    <div class="left-block">
      <div class="host-name" id="hostName"></div>
      <div class="host-title" id="hostTitle"></div>
      <div class="host-subtitle" id="hostSubtitle"></div>
    </div>

    <div class="gold-divider"></div>

    <div class="center-block">
      <div class="meeting-kicker" id="meetingKicker"></div>
      <div class="meeting-title" id="meetingTitle"></div>
      <div class="guest-row">
        <div class="guest-label">Guest Speaker</div>
        <div class="guest-speaker" id="guestSpeaker"></div>
      </div>
    </div>

    <div class="right-block">
      <div class="logo-shell">
        <img id="companyLogo" src="" alt="Company Logo">
      </div>
    </div>

    <div class="version-tag" id="versionTag"></div>
  </div>
</div>

<script>
document.getElementById("hostName").textContent = HOST_NAME;
document.getElementById("hostTitle").textContent = HOST_TITLE;
document.getElementById("hostSubtitle").textContent = HOST_SUBTITLE;

document.getElementById("meetingKicker").textContent = MEETING_KICKER;
document.getElementById("meetingTitle").textContent = MEETING_TITLE;
document.getElementById("guestSpeaker").textContent = GUEST_SPEAKER;

/* cache-busting logo load */
document.getElementById("companyLogo").src = LOGO_FILE + "?v=" + VERSION;

/* optional visible version */
const versionTag = document.getElementById("versionTag");
if (SHOW_VERSION) {
  versionTag.textContent = VERSION;
} else {
  versionTag.style.display = "none";
}
</script>

</body>
</html>
