<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

html, body {

  margin:0;

  width:100%;

  height:100%;

  background:transparent;

  overflow:hidden;

  font-family:'Inter', Arial, sans-serif;

}

.overlay-bar {

  position:fixed;

  left:50%;

  bottom:3%;

  transform:translateX(-50%);

  width:88%;

  max-width:1400px;

  height:70px;

  padding:0 18px;

  display:grid;

  grid-template-columns:240px 2px 1fr;

  align-items:center;

  column-gap:14px;

  border-radius:18px;

  background: rgba(20,20,24,0.18);

  border:1px solid rgba(255,255,255,0.14);

  -webkit-backdrop-filter: blur(18px);

  backdrop-filter: blur(18px);

  box-shadow:0 10px 26px rgba(0,0,0,0.18);

  overflow:visible;

}

/* LEFT */

.left-block{

  display:flex;

  flex-direction:column;

  justify-content:center;

  z-index:2;

}

.host-name{

  font-family:'Allura', cursive;

  font-size:28px;

  color:#fff;

}

.host-role{

  font-size:10px;

  letter-spacing:.15em;

  text-transform:uppercase;

  color:#fff;

}

.host-company{

  font-size:11px;

  color:rgba(255,255,255,0.85);

}

/* DIVIDER */

.divider{

  width:2px;

  height:38px;

  background:#c9a24a;

}

/* CENTER */

.center-block{

  display:flex;

  flex-direction:column;

  justify-content:center;

  z-index:2;

}

.meeting-title{

  font-size:20px;

  font-weight:800;

  color:#fff;

}

.guest-line{

  font-size:12px;

  color:#fff;

}

.guest-label{

  color:#c9a24a;

  font-weight:700;

}

/* 🔥 MASSIVE LOGO */

.logo-wrap{

  position:absolute;

  right:-40px;   /* pushes it OUTSIDE the bar */

  bottom:-40px;  /* lets it hang lower */

  z-index:5;

}

.logo-wrap img{

  height:320px;   /* 🔥 BIG */

  width:auto;

  max-width:none;

  max-height:none;

}

/* responsive */

@media (max-width:900px){

  .logo-wrap img{

    height:180px;

  }

}

</style>

</head>

<body>

<div class="overlay-bar">

  <div class="left-block">

    <div class="host-name">Tabitha Tittle</div>

    <div class="host-role">QUALIFYING BROKER</div>

    <div class="host-company">Leading Edge Real Estate Group</div>

  </div>

  <div class="divider"></div>

  <div class="center-block">

    <div class="meeting-title">Office Meeting</div>

    <div class="guest-line">

      <span class="guest-label">GUEST SPEAKER:</span> Add Name Here

    </div>

  </div>

  <div class="logo-wrap">

    <img src="OMLE.png?v=990">

  </div>

</div>

</body>

</html>
