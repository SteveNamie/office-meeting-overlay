<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Office Meeting Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:'Inter', Arial, sans-serif;
}

:root{
  --bar-width: 86%;
  --bar-max-width: 1120px;
  --bar-height: 88px;
  --bar-bottom: 4%;

  /* darker frosted bar */
  --bar-bg: rgba(28, 28, 30, 0.42);
  --bar-border: rgba(255,255,255,0.10);
  --bar-shadow: 0 10px 28px rgba(0,0,0,0.24);

  --text-main: #ffffff;
  --text-soft: rgba(255,255,255,0.92);
  --gold: #c9a24a;

  --left-width: 285px;
  --right-width: 190px;
  --divider-height: 50px;
  --logo-height: 72px;
}

.overlay-bar{
  position:fixed;
  left:50%;
  bottom:var(--bar-bottom);
  transform:translateX(-50%);
  width:var(--bar-width);
  max-width:var(--bar-max-width);
  height:var(--bar-height);

  display:grid;
  grid-template-columns: var(--left-width) 2px 1fr var(--right-width);
  align-items:center;
  column-gap:20px;

  padding:0 24px;
  box-sizing:border-box;

  border-radius:18px;
  border:1px solid var(--bar-border);
  background:var(--bar-bg);
  box-shadow:var(--bar-shadow);

  -webkit-backdrop-filter: blur(16px) saturate(135%);
  backdrop-filter: blur(16px) saturate(135%);
}

/* subtle top sheen */
.overlay-bar::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  background:linear-gradient(
    180deg,
    rgba(255,255,255,0.10) 0%,
    rgba(255,255,255,0.03) 22%,
    rgba(255,255,255,0.00) 55%
  );
  pointer-events:none;
}

.left-block{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
  z-index:1;
}

.host-name{
  font-family:'Allura', cursive;
  font-size:36px;
  line-height:0.95;
  color:var(--text-main);
  margin-bottom:5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.host-role{
  font-size:11px;
  line-height:1.1;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:#ffffff;
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.host-company{
  font-size:12px;
  line-height:1.1;
  color:var(--text-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.gold-divider{
  width:2px;
  height:var(--divider-height);
  background:var(--gold);
  border-radius:999px;
  justify-self:center;
  position:relative;
  z-index:1;
}

.center-block{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
  z-index:1;
}

.meeting-title{
  font-size:24px;
  line-height:1.05;
  font-weight:700;
  color:var(--text-main);
  margin-bottom:5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.guest-line{
  font-size:13px;
  line-height:1.1;
  color:var(--text-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.guest-label{
  color:var(--gold);
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.right-block{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  min-width:0;
  position:relative;
  z-index:1;
}

.right-block img{
  display:block;
  max-width:100%;
  max-height:var(--logo-height);
  object-fit:contain;
}

/* tablet */
@media (max-width: 1000px){
  :root{
    --bar-width: 92%;
    --left-width: 245px;
    --right-width: 150px;
    --logo-height: 140px;
  }

  .host-name{ font-size:24px; }
  .meeting-title{ font-size:21px; }
}

/* phone */
@media (max-width: 760px){
  :root{
    --bar-width: 94%;
    --bar-height: auto;
  }

  .overlay-bar{
    grid-template-columns: 1fr;
    row-gap:8px;
    height:auto;
    padding:12px 16px;
  }

  .gold-divider{
    display:none;
  }

  .right-block{
    justify-content:flex-start;
  }

  .host-name,
  .host-role,
  .host-company,
  .meeting-title,
  .guest-line{
    white-space:normal;
  }
}
</style>
</head>
<body>

<div class="overlay-bar">
  <div class="left-block">
    <div class="host-name">Tabitha Tittle</div>
    <div class="host-role">Qualifying Broker</div>
    <div class="host-company">Leading Edge Real Estate Group</div>
  </div>

  <div class="gold-divider"></div>

  <div class="center-block">
    <div class="meeting-title">Office Meeting</div>
    <div class="guest-line"><span class="guest-label">Guest Speaker:</span> Add Name Here</div>
  </div>

  <div class="right-block">
    <img src="OMLE.png?v=997" alt="Leading Edge Logo">
  </div>
</div>

</body>
</html>
