<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Office Meeting Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:'Inter', Arial, sans-serif;
}

:root{
  --bar-width: 86%;
  --bar-max-width: 1200px;
  --bar-height: 120px;

  --glass-bg: rgba(112, 101, 86, 0.55);
  --glass-border: rgba(255,255,255,0.08);
  --text-main: #ffffff;
  --text-soft: rgba(255,255,255,0.92);
  --gold: #c9a24a;
}

.overlay-bar{
  position:fixed;
  left:50%;
  bottom:4%;
  transform:translateX(-50%);
  width:var(--bar-width);
  max-width:var(--bar-max-width);
  min-height:var(--bar-height);

  display:grid;
  grid-template-columns: 290px 2px 1fr 220px;
  align-items:center;
  column-gap:20px;

  padding:16px 24px;
  box-sizing:border-box;

  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-radius:18px;

  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);

  box-shadow: 0 8px 28px rgba(0,0,0,0.18);
}

.left-block{
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
}

.host-name{
  font-family:'Allura', cursive;
  font-size:22px;
  line-height:1;
  color:var(--text-main);
  margin-bottom:6px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.host-title{
  font-size:12px;
  line-height:1.2;
  color:var(--text-soft);
  letter-spacing:.09em;
  text-transform:uppercase;
  margin-bottom:3px;
}

.host-subtitle{
  font-size:13px;
  line-height:1.2;
  color:var(--text-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.gold-divider{
  width:2px;
  height:56px;
  background:var(--gold);
  border-radius:2px;
  justify-self:center;
}

.center-block{
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
}

.meeting-title{
  font-size:20px;
  line-height:1.1;
  font-weight:600;
  color:var(--text-main);
  margin-bottom:6px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.guest-speaker{
  font-size:15px;
  line-height:1.2;
  color:var(--text-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.right-block{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  min-width:0;
}

.right-block img{
  max-width:100%;
  max-height:64px;
  object-fit:contain;
  display:block;
}

/* tablet */
@media (max-width: 1000px){
  .overlay-bar{
    grid-template-columns: 240px 2px 1fr 160px;
    padding:14px 18px;
  }

  .host-name{ font-size:20px; }
  .meeting-title{ font-size:18px; }
  .guest-speaker{ font-size:14px; }
  .right-block img{ max-height:54px; }
}

/* phone fallback */
@media (max-width: 760px){
  .overlay-bar{
    width:92%;
    grid-template-columns: 1fr;
    row-gap:10px;
    padding:14px 16px;
    min-height:auto;
  }

  .gold-divider{
    display:none;
  }

  .right-block{
    justify-content:flex-start;
  }

  .host-name,
  .host-subtitle,
  .meeting-title,
  .guest-speaker{
    white-space:normal;
  }
}
</style>
</head>
<body>

<div class="overlay-bar">
  <div class="left-block">
    <div class="host-name" id="hostName">Tabitha Tittle</div>
    <div class="host-title" id="hostTitle">QUALIFYING BROKER</div>
    <div class="host-subtitle" id="hostSubtitle">Leading Edge Real Estate Group</div>
  </div>

  <div class="gold-divider"></div>

  <div class="center-block">
    <div class="meeting-title" id="meetingTitle">Office Meeting</div>
    <div class="guest-speaker" id="guestSpeaker">Guest Speaker: Add Name Here</div>
  </div>

  <div class="right-block">
    <img id="companyLogo" src="OMLE.png" alt="Company Logo">
  </div>
</div>

</body>
</html>
