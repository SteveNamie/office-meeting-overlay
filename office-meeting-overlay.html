<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Meeting Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: 'Inter', Arial, sans-serif;
}

.overlay-bar {
  position: fixed;
  left: 50%;
  bottom: 3%;
  transform: translateX(-50%);
  width: 86%;
  max-width: 1140px;
  height: 96px;
  padding: 0 24px;
  box-sizing: border-box;

  display: grid;
  grid-template-columns: 300px 2px 1fr 240px;
  align-items: center;
  column-gap: 22px;

  background: rgba(30, 30, 34, 0.22);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 20px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.18);

  -webkit-backdrop-filter: blur(18px);
  backdrop-filter: blur(18px);
}

.left-block {
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.host-name {
  font-family: 'Allura', cursive;
  font-size: 36px;
  line-height: 0.95;
  color: #ffffff;
  margin-bottom: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.host-role {
  font-size: 11px;
  line-height: 1.1;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: #ffffff;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.host-company {
  font-size: 12px;
  line-height: 1.1;
  color: rgba(255,255,255,0.92);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.gold-divider {
  width: 2px;
  height: 52px;
  background: #c9a24a;
  border-radius: 999px;
  justify-self: center;
}

.center-block {
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.meeting-title {
  font-size: 24px;
  line-height: 1.05;
  font-weight: 700;
  color: #ffffff;
  margin-bottom: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.guest-line {
  font-size: 13px;
  line-height: 1.1;
  color: rgba(255,255,255,0.92);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.guest-label {
  color: #c9a24a;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
}

.right-block {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  min-width: 0;
}

.right-block img {
  display: block;
  max-width: 100%;
  max-height: 92px;
  object-fit: contain;
}

@media (max-width: 1000px) {
  .overlay-bar {
    width: 92%;
    grid-template-columns: 250px 2px 1fr 170px;
  }

  .host-name {
    font-size: 28px;
  }

  .meeting-title {
    font-size: 21px;
  }

  .right-block img {
    max-height: 72px;
  }
}

@media (max-width: 760px) {
  .overlay-bar {
    width: 94%;
    height: auto;
    padding: 14px 16px;
    grid-template-columns: 1fr;
    row-gap: 8px;
  }

  .gold-divider {
    display: none;
  }

  .right-block {
    justify-content: flex-start;
  }

  .host-name,
  .host-role,
  .host-company,
  .meeting-title,
  .guest-line {
    white-space: normal;
  }
}
</style>
</head>
<body>

<div class="overlay-bar">
  <div class="left-block">
    <div class="host-name">Tabitha Tittle</div>
    <div class="host-role">Qualifying Broker</div>
    <div class="host-company">Leading Edge Real Estate Group</div>
  </div>

  <div class="gold-divider"></div>

  <div class="center-block">
    <div class="meeting-title">Office Meeting</div>
    <div class="guest-line"><span class="guest-label">Guest Speaker:</span> Add Name Here</div>
  </div>

  <div class="right-block">
    <img src="OMLE.png?v=995" alt="Leading Edge Logo">
  </div>
</div>

</body>
</html>
