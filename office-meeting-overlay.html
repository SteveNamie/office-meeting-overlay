<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Office Meeting Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

html, body {

  margin: 0;

  width: 100%;

  height: 100%;

  background: transparent;

  overflow: hidden;

  font-family: 'Inter', Arial, sans-serif;

}

.overlay-bar {

  position: fixed;

  left: 50%;

  bottom: 3%;

  transform: translateX(-50%);

  width: 88%;

  max-width: 1380px;

  height: 74px;

  padding: 0 340px 0 16px;

  box-sizing: border-box;

  display: grid;

  grid-template-columns: 240px 2px 1fr;

  align-items: center;

  column-gap: 14px;

  border-radius: 18px;

  background: rgba(20,20,24,0.18);

  border: 1px solid rgba(255,255,255,0.14);

  -webkit-backdrop-filter: blur(18px) saturate(130%);

  backdrop-filter: blur(18px) saturate(130%);

  box-shadow: 0 10px 26px rgba(0,0,0,0.18);

  overflow: visible;

}

.overlay-bar::before {

  content: "";

  position: absolute;

  inset: 0;

  border-radius: 18px;

  background: linear-gradient(

    180deg,

    rgba(255,255,255,0.08) 0%,

    rgba(255,255,255,0.02) 30%,

    rgba(255,255,255,0.00) 65%

  );

  pointer-events: none;

}

.left-block {

  min-width: 0;

  display: flex;

  flex-direction: column;

  justify-content: center;

  position: relative;

  z-index: 2;

}

.host-name {

  font-family: 'Allura', cursive;

  font-size: 28px;

  line-height: 0.95;

  color: #fff;

  margin-bottom: 2px;

  white-space: nowrap;

  overflow: hidden;

  text-overflow: ellipsis;

}

.host-role {

  font-size: 10px;

  line-height: 1.05;

  letter-spacing: .14em;

  text-transform: uppercase;

  font-weight: 700;

  color: #fff;

  margin-bottom: 2px;

  white-space: nowrap;

  overflow: hidden;

  text-overflow: ellipsis;

}

.host-company {

  font-size: 11px;

  line-height: 1.05;

  color: rgba(255,255,255,0.88);

  white-space: nowrap;

  overflow: hidden;

  text-overflow: ellipsis;

}

.divider {

  width: 2px;

  height: 40px;

  background: #c9a24a;

  border-radius: 999px;

  justify-self: center;

  position: relative;

  z-index: 2;

}

.center-block {

  min-width: 0;

  display: flex;

  flex-direction: column;

  justify-content: center;

  position: relative;

  z-index: 2;

}

.meeting-title {

  font-size: 21px;

  line-height: 1;

  font-weight: 800;

  color: #fff;

  margin-bottom: 3px;

  white-space: nowrap;

  overflow: hidden;

  text-overflow: ellipsis;

}

.guest-line {

  font-size: 12px;

  line-height: 1.05;

  color: rgba(255,255,255,0.92);

  white-space: nowrap;

  overflow: hidden;

  text-overflow: ellipsis;

}

.guest-label {

  color: #c9a24a;

  font-weight: 800;

  letter-spacing: .03em;

  text-transform: uppercase;

}

/* HUGE LOGO - no grid constraints */

.logo-wrap {

  position: absolute;

  right: 8px;

  top: 50%;

  transform: translateY(-50%);

  width: 330px;

  height: 220px;

  display: flex;

  align-items: center;

  justify-content: flex-end;

  z-index: 3;

  overflow: visible;

}

.logo-wrap img {

  display: block;

  height: 220px;

  width: auto;

  max-width: none;

  max-height: none;

  object-fit: contain;

}

/* tablet */

@media (max-width: 1100px) {

  .overlay-bar {

    width: 92%;

    padding: 0 220px 0 14px;

    grid-template-columns: 210px 2px 1fr;

  }

  .host-name { font-size: 24px; }

  .meeting-title { font-size: 18px; }

  .logo-wrap {

    width: 210px;

    height: 140px;

  }

  .logo-wrap img {

    height: 140px;

  }

}

/* phone */

@media (max-width: 760px) {

  .overlay-bar {

    width: 94%;

    height: auto;

    padding: 12px 16px;

    grid-template-columns: 1fr;

    row-gap: 8px;

  }

  .divider {

    display: none;

  }

  .logo-wrap {

    position: static;

    transform: none;

    width: auto;

    height: auto;

    justify-content: flex-start;

  }

  .logo-wrap img {

    height: 80px;

  }

  .host-name,

  .host-role,

  .host-company,

  .meeting-title,

  .guest-line {

    white-space: normal;

  }

}

</style>

</head>

<body>

<div class="overlay-bar">

  <div class="left-block">

    <div class="host-name">Tabitha Tittle</div>

    <div class="host-role">QUALIFYING BROKER</div>

    <div class="host-company">Leading Edge Real Estate Group</div>

  </div>

  <div class="divider"></div>

  <div class="center-block">

    <div class="meeting-title">Office Meeting</div>

    <div class="guest-line"><span class="guest-label">GUEST SPEAKER:</span> Add Name Here</div>

  </div>

  <div class="logo-wrap">

    <img src="OMLE.png?v=991" alt="Leading Edge Logo">

  </div>

</div>

</body>

</html>
