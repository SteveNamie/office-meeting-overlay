<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Office Meeting Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:'Inter', Arial, sans-serif;
}

:root{
  --bar-width: 86%;
  --bar-max-width: 1140px;
  --bar-height: 96px;
  --bar-bottom: 3.2%;

  /* more transparent frosted dark gray */
  --bar-bg: rgba(40, 40, 44, 0.26);
  --bar-border: rgba(255,255,255,0.14);
  --bar-shadow: 0 10px 28px rgba(0,0,0,0.18);

  --text-main: #ffffff;
  --text-soft: rgba(255,255,255,0.92);
  --gold: #c9a24a;

  --left-width: 300px;
  --right-width: 230px;
  --divider-height: 52px;
  --logo-height: 92px;
}

.overlay-bar{
  position:fixed;
  left:50%;
  bottom:var(--bar-bottom);
  transform:translateX(-50%);
  width:var(--bar-width);
  max-width:var(--bar-max-width);
  min-height:var(--bar-height);

  display:grid;
  grid-template-columns: var(--left-width) 2px 1fr var(--right-width);
  align-items:center;
  column-gap:22px;

  padding:0 24px;
  box-sizing:border-box;

  border-radius:20px;
  border:1px solid var(--bar-border);
  background:var(--bar-bg);
  box-shadow:var(--bar-shadow);

  -webkit-backdrop-filter: blur(18px) saturate(135%);
  backdrop-filter: blur(18px) saturate(135%);
}

/* light frosted sheen */
.overlay-bar::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:20px;
  background:linear-gradient(
    180deg,
    rgba(255,255,255,0.12) 0%,
    rgba(255,255,255,0.04) 22%,
    rgba(255,255,255,0.01) 55%,
    rgba(255,255,255,0.00) 100%
  );
  pointer-events:none;
}

.left-block{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
  z-index:1;
}

.host-name{
  font-family:'Allura', cursive;
  font-size:36px;
  line-height:0.95;
  color:var(--text-main);
  margin-bottom:5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.host-role{
  font-size:11px;
  line-height:1.1;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:#ffffff;
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.host-company{
  font-size:12px;
  line-height:1.1;
  color:var(--text-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.gold-divider{
  width:2px;
  height:var(--divider-height);
  background:var(--gold);
  border-radius:999px;
  justify-self:center;
  position:relative;
  z-index:1;
}

.center-block{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
  z-index:1;
}

.meeting-title{
  font-size:24px;
  line-height:1.05;
  font-weight:700;
  color:var(--text-main);
  margin-bottom:5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.guest-line{
  font-size:13px;
  line-height:1.1;
  color:var(--text-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.guest-label{
  color:var(--gold);
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.right-block{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  min-width:0;
  position:relative;
  z-index:1;
}

.right-block img{
  display:block;
  max-width:100%;
  max-height:var(--logo-height);
  object-fit:contain;
}
