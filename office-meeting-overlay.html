<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

html, body {

  margin:0;

  width:100%;

  height:100%;

  background:transparent;

  overflow:hidden;

  font-family:'Inter', Arial, sans-serif;

}

/* =========================

   BAR SETTINGS

========================= */

.overlay-bar {

  position:fixed;

  left:50%;

  bottom:3%;

  transform:translateX(-50%);

  width:88%;

  max-width:1200px;

  height:70px; /* 🔥 SHORT BAR */

  display:grid;

  grid-template-columns: 260px 2px 1fr 260px;

  align-items:center;

  column-gap:14px;

  padding:0 16px;

  border-radius:16px;

  /* 🔥 DARK FROSTED */

  background: rgba(20,20,24,0.28);

  border:1px solid rgba(255,255,255,0.12);

  -webkit-backdrop-filter: blur(16px);

  backdrop-filter: blur(16px);

  box-shadow: 0 8px 24px rgba(0,0,0,0.20);

}

/* =========================

   LEFT

========================= */

.left-block{

  display:flex;

  flex-direction:column;

  justify-content:center;

}

.host-name{

  font-family:'Allura', cursive;

  font-size:24px;

  color:#fff;

  line-height:1;

}

.host-role{

  font-size:10px;

  letter-spacing:.15em;

  text-transform:uppercase;

  color:#fff;

  margin-top:2px;

}

.host-company{

  font-size:11px;

  color:rgba(255,255,255,0.85);

}

/* =========================

   DIVIDER

========================= */

.divider{

  width:2px;

  height:40px;

  background:#c9a24a;

}

/* =========================

   CENTER

========================= */

.center-block{

  display:flex;

  flex-direction:column;

  justify-content:center;

}

.meeting-title{

  font-size:20px;

  font-weight:700;

  color:#fff;

}

.guest-line{

  font-size:12px;

  color:rgba(255,255,255,0.9);

}

.guest-label{

  color:#c9a24a;

  font-weight:600;

}

/* =========================

   RIGHT (LOGO)

========================= */

.right-block{

  display:flex;

  justify-content:flex-end;

  align-items:center;

}

/* 🔥 THIS MAKES IT BIG */

.right-block img{

  height:180px;

  width:auto;

}

/* =========================

   RESPONSIVE

========================= */

@media (max-width:900px){

  .overlay-bar{

    grid-template-columns: 200px 2px 1fr 160px;

  }

  .right-block img{

    height:70px;

  }

  .host-name{

    font-size:20px;

  }

}

</style>

</head>

<body>

<div class="overlay-bar">

  <div class="left-block">

    <div class="host-name">Tabitha Tittle</div>

    <div class="host-role">QUALIFYING BROKER</div>

    <div class="host-company">Leading Edge Real Estate Group</div>

  </div>

  <div class="divider"></div>

  <div class="center-block">

    <div class="meeting-title">Office Meeting</div>

    <div class="guest-line">

      <span class="guest-label">GUEST SPEAKER:</span> Add Name Here

    </div>

  </div>

  <div class="right-block">

    <img src="OMLE.png?v=994">

  </div>

</div>

</body>

</html>
