<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Office Meeting Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:'Inter', Arial, sans-serif;
}

:root{
  --bar-width: 92%;
  --bar-max-width: 1650px;
  --bar-height: 230px;
  --bar-bottom: 4.5%;

  --bar-bg: rgba(22,22,24,0.46);
  --bar-border: rgba(255,255,255,0.20);
  --bar-shadow: 0 18px 40px rgba(0,0,0,0.28);

  --white: #ffffff;
  --white-soft: rgba(255,255,255,0.94);
  --gold: #d0a23e;

  --left-width: 560px;
  --divider-width: 6px;
  --divider-height: 130px;
  --right-width: 470px;
  --logo-height: 190px;
}

html::before{
  content:"";
  position:fixed;
  inset:0;
  background:transparent;
  pointer-events:none;
}

.overlay-bar{
  position:fixed;
  left:50%;
  bottom:var(--bar-bottom);
  transform:translateX(-50%);
  width:var(--bar-width);
  max-width:var(--bar-max-width);
  min-height:var(--bar-height);
  box-sizing:border-box;

  display:grid;
  grid-template-columns: var(--left-width) var(--divider-width) 1fr var(--right-width);
  align-items:center;
  column-gap:42px;

  padding: 26px 42px;
  border-radius: 34px;
  overflow:hidden;

  background:
    linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 18%, rgba(255,255,255,0.00) 45%),
    rgba(22,22,24,0.46);

  border:1px solid var(--bar-border);
  box-shadow: var(--bar-shadow);

  -webkit-backdrop-filter: blur(24px) saturate(135%);
  backdrop-filter: blur(24px) saturate(135%);
}

.overlay-bar::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:34px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
  pointer-events:none;
}

/* LEFT */
.left-block{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.host-name{
  font-family:'Allura', cursive;
  font-size:92px;
  line-height:0.90;
  color:var(--white);
  margin-bottom:14px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  text-shadow: 0 2px 5px rgba(0,0,0,0.15);
}

.host-role{
  font-size:30px;
  line-height:1;
  font-weight:800;
  letter-spacing:.03em;
  text-transform:uppercase;
  color:var(--white);
  margin-bottom:12px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.host-company{
  font-size:28px;
  line-height:1.08;
  font-weight:500;
  color:var(--white-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* DIVIDER */
.gold-divider{
  width:var(--divider-width);
  height:var(--divider-height);
  border-radius:999px;
  background: var(--gold);
  justify-self:center;
  box-shadow: 0 0 18px rgba(208,162,62,0.20);
}

/* CENTER */
.center-block{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.meeting-title{
  font-size:74px;
  line-height:0.98;
  font-weight:800;
  color:var(--white);
  margin-bottom:18px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.guest-line{
  font-size:34px;
  line-height:1.05;
  font-weight:500;
  color:var(--white-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.guest-label{
  color:var(--gold);
  font-weight:800;
  letter-spacing:.02em;
  text-transform:uppercase;
}

/* RIGHT */
.right-block{
  min-width:0;
  display:flex;
  align-items:center;
  justify-content:flex-end;
}

.right-block img{
  display:block;
  max-width:100%;
  max-height:var(--logo-height);
