<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Office Meeting Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:'Inter', Arial, sans-serif;
}

/* =========================
   EASY EDIT SECTION
   Change only these values
========================= */
:root{
  --bar-width: 86%;
  --bar-max-width: 1120px;
  --bar-height: 82px;
  --bar-bottom: 4%;

  --bar-bg: rgba(96, 80, 58, 0.34);
  --bar-border: rgba(255,255,255,0.08);
  --bar-shadow: 0 8px 24px rgba(0,0,0,0.16);

  --text-main: #ffffff;
  --text-soft: rgba(255,255,255,0.90);
  --gold: #c9a24a;

  --left-width: 270px;
  --right-width: 150px;
  --divider-height: 46px;
  --logo-height: 54px;
}

/* =========================
   MAIN BAR
========================= */
.overlay-bar{
  position:fixed;
  left:50%;
  bottom:var(--bar-bottom);
  transform:translateX(-50%);
  width:var(--bar-width);
  max-width:var(--bar-max-width);
  height:var(--bar-height);

  display:grid;
  grid-template-columns: var(--left-width) 2px 1fr var(--right-width);
  align-items:center;
  column-gap:18px;

  padding:0 22px;
  box-sizing:border-box;

  border-radius:16px;
  border:1px solid var(--bar-border);
  background:var(--bar-bg);
  box-shadow:var(--bar-shadow);

  -webkit-backdrop-filter: blur(12px) saturate(120%);
  backdrop-filter: blur(12px) saturate(120%);
}

/* =========================
   LEFT
========================= */
.left-block{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.host-name{
  font-family:'Allura', cursive;
  font-size:22px;
  line-height:0.95;
  color:var(--text-main);
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.host-role{
  font-size:11px;
  line-height:1.1;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.host-company{
  font-size:12px;
  line-height:1.1;
  color:var(--text-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* =========================
   GOLD DIVIDER
========================= */
.gold-divider{
  width:2px;
  height:var(--divider-height);
  background:var(--gold);
  border-radius:999px;
  justify-self:center;
}

/* =========================
   CENTER
========================= */
.center-block{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.meeting-title{
  font-size:22px;
  line-height:1.05;
  font-weight:700;
  color:var(--text-main);
  margin-bottom:5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.guest-line{
  font-size:13px;
  line-height:1.1;
  color:var(--text-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.guest-label{
  color:var(--gold);
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
}

/* =========================
   RIGHT
========================= */
.right-block{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  min-width:0;
}

.right-block img{
  display:block;
  max-width:100%;
  max-height:var(--logo-height);
  object-fit:contain;
}

/* =========================
   RESPONSIVE
========================= */
@media (max-width: 1000px){
  :root{
    --bar-width: 92%;
    --left-width: 230px;
    --right-width: 120px;
    --logo-height: 46px;
  }

  .host-name{ font-size:19px; }
  .meeting-title{ font-size:19px; }
}

@media (max-width: 760px){
  :root{
    --bar-width: 94%;
    --bar-height: auto;
  }

  .overlay-bar{
    grid-template-columns: 1fr;
    row-gap:8px;
    height:auto;
    padding:12px 16px;
  }

  .gold-divider{
    display:none;
  }

  .right-block{
    justify-content:flex-start;
  }

  .host-name,
  .host-role,
  .host-company,
  .meeting-title,
  .guest-line{
    white-space:normal;
  }
}
</style>
</head>
<body>

<div class="overlay-bar">
  <div class="left-block">
    <div class="host-name">Tabitha Tittle</div>
    <div class="host-role">Qualifying Broker</div>
    <div class="host-company">Leading Edge Real Estate Group</div>
  </div>

  <div class="gold-divider"></div>

  <div class="center-block">
    <div class="meeting-title">Office Meeting</div>
    <div class="guest-line"><span class="guest-label">Guest Speaker:</span> Add Name Here</div>
  </div>

  <div class="right-block">
    <img src="OMLE.png?v=999" alt="Leading Edge Logo">
  </div>
</div>

</body>
</html>
